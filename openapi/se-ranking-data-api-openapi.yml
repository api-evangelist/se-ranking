openapi: 3.0.0
info:
  title: SE Ranking Data API
  description: >-
    SEO data API for keywords, domains, backlinks, AI Search, SERP, and site
    audit.
  version: 1.0.0
  contact:
    name: SE Ranking API Support
    url: https://seranking.com/api
servers:
  - url: https://api.seranking.com
    description: Production
components:
  securitySchemes:
    apikeyAuth:
      type: apiKey
      in: query
      name: apikey
security:
  - apikeyAuth: []
tags:
  - name: backlinks
    description: >-
      # Backlinks API


      This collection of requests allows you to conduct a comprehensive analysis
      of the backlink profile for any given target, whether it's a root domain,
      a specific host (subdomain), or a particular URL.


      You can use these endpoints to retrieve high-level statistics, fetch
      detailed backlink lists, analyze historical trends, and check authority
      scores.


      ### Summary & Core Metrics


      Use these endpoints to get a quick overview of a target's backlink
      profile. These requests support batching for up to 100 targets.


      - **`summary`**: Returns extended statistics, including the number of
      referring domains, IPs, top anchors, TLDs, and more.
          
      - **`metrics`**: Retrieves a set of key metrics, such as the total number
      of backlinks, referring domains, and dofollow/nofollow link counts.
          
      - **`count`**: Provides a simple count of the total number of live
      backlinks for a target.
          

      ### Detailed Backlink Retrieval


      Use these endpoints to get lists of the actual backlinks pointing to a
      target.


      - **`all`**: Fetches a detailed list of backlinks with powerful filtering
      and sorting options. This is ideal for getting the "top" backlinks based
      on criteria like InLink Rank.
          
      - **`raw`**: Retrieves a complete, unfiltered list of all backlinks using
      efficient cursor-based pagination. This is best for fetching an entire
      dataset in batches.
          
      - **`export`**: Exports all backlinks for a target into a downloadable
      `.csv.gz` file. This process is asynchronous and designed for very
      large-scale data retrieval.
          

      ### Historical Data & Trends


      Track changes in a backlink profile over time.


      - **`history`**: Get a list of new and lost backlinks within a specified
      date range.
          
      - **`history/count`**: Returns the number of new or lost backlinks for
      each day in a given period.
          
      - **`history/cumulative`**: Provides the total number of live backlinks
      for each day in a given period.
          

      ### Analyze Specific Backlink Aspects


      Dive deeper into specific components of the backlink profile.


      - **`anchors`**: Returns information about the anchor texts used in links
      pointing to a target.
          
      - **`refdomains`**: Provides details on the unique referring domains,
      including their authority and the number of links from each.
          
      - **`referring-ips`** **&** **`subnets`**: Analyzes the network
      distribution of backlinks by IP address and C-class subnets.
          
      - **`indexed-pages`**: Lists the pages on the target site that have
      received one or more backlinks.
          

      ### Authority Scores


      Check the calculated authority of a target based on its backlink profile.


      - **`authority`**: Retrieves both the InLink Rank (Page Authority) and
      Domain InLink Rank (Domain Authority).
          
      - **`authority/domain`**: Focuses specifically on Domain Authority,
      including its distribution and historical values.
          
      - **`authority/page`**: Focuses specifically on Page Authority and its
      historical values.
  - name: Domain Analysis
    description: >-
      This collection of endpoints allows you to perform in-depth competitive
      analysis on any domain. Use these requests to uncover keyword strategies,
      traffic trends, and competitor performance in both organic and paid
      search.


      ### Performance Overviews


      Get high-level statistics about a domain's search performance.


      - **Regional database**: Get detailed organic and paid stats for a domain
      within a single, selected regional database.
          
      - **Worldwide aggregate**: Aggregate a domain's global search performance
      metrics for the current month.
          
      - **History trends**: Track historical trends for keywords, traffic, and
      cost for organic or paid search within a specific region.
          

      ### Keyword Analysis


      Dive deep into the specific keywords a domain ranks for.


      - **Domain keywords**: Fetch a filterable and sortable list of all organic
      or paid keywords for a domain.
          
      - **Domain keywords comparison**: Compare two domains to find common
      keywords (overlap) or identify keyword gaps.
          

      ### Competitor & Ad Analysis


      Analyze the competitive landscape and paid advertising strategies.


      - **Competitors**: Discover a domain's top organic or paid competitors and
      see the number of keywords you have in common.
          
      - **Paid ads**: Analyze paid ads either by keyword (to see who is bidding)
      or by domain (to see what a specific domain is bidding on).
  - name: Keyword Research
    description: >-
      This collection of endpoints is designed for comprehensive keyword
      analysis and discovery. Use these requests to retrieve performance metrics
      for large lists of keywords or to generate new keyword ideas based on a
      seed term.


      This folder is divided into two main categories:


      ### Bulk Keyword Metrics


      - **Export Keywords Metrics**: Submit a list of up to 5,000 keywords to
      get detailed data points for each, including search volume, CPC,
      competition score, keyword difficulty, and historical search volume
      trends. This is ideal for bulk analysis and data enrichment.
          

      ### Keyword Discovery


      Use these endpoints to expand your keyword lists and uncover new ranking
      opportunities.


      - **Get Similar Keywords**: Find keywords that are semantically similar to
      your seed keyword, including synonyms and close variations.
          
      - **Get Related Keywords**: Discover keywords that are topically related,
      based on having a high number of overlapping URLs in their search results.
          
      - **Get Question Keywords**: Generate a list of keywords phrased as common
      user questions, perfect for content marketing and FAQ creation.
          
      - **Get Longtail Keywords**: Find longer, more specific keyword phrases
      that often have lower competition and higher conversion rates.
  - name: AI search
    description: >-
      This collection of endpoints allows you to analyze a domain or brand's
      visibility and performance within various Large Language Model (LLM)
      results, such as ChatGPT, Gemini, and Perplexity. Use these tools to track
      your presence in AI-generated answers, discover the prompts that feature
      your brand or domain, and understand your overall AI search footprint.


      ### Overview & Discovery


      - **Overview**: Get a high-level summary of a domain's performance and
      historical trends within a specific LLM, including metrics like link
      presence, average position, and AI-driven traffic.
          
      - **Discover Brand by URL**: A utility endpoint to identify the primary
      brand name associated with a target domain, useful for subsequent
      brand-based queries.
          

      ### Prompt Analysis


      - **Get Prompts by Target**: Retrieve a list of all prompts where a
      specific domain, subdomain, or URL is featured as a link or mention in an
      LLM's answer.
          
      - **Get Prompts by Brand**: Find all prompts where a specific brand name
      is mentioned in an LLM's answer, allowing you to track brand visibility
      and context.
  - name: SERP Results
    description: >-
      This collection of endpoints allows you to retrieve the top 100 search
      engine results pages (SERPs) for any keyword in real-time, without needing
      an active project in SE Ranking. The API uses an asynchronous, task-based
      workflow.


      **Note:** Using the ‘Add SERP Tasks’ endpoint costs 10 credits per
      request.


      ### Workflow


      1. **Add SERP Tasks**: Submit one or more keywords to the processing queue
      to initiate a SERP scrape.
          
      2. **Get SERP Task Status and Results**: Use the `task_id` from the
      previous step to check if the task is complete and retrieve the SERP data.
          
      3. **List SERP Tasks**: View a list of all tasks you have submitted in the
      last 24 hours.
          

      Results include the URL, title, and snippet for each of the top 100
      positions and are stored for 24 hours after collection.
  - name: SERP Results > classic
  - name: Website Audit
    description: >-
      This collection of endpoints provides a comprehensive suite of tools to
      programmatically manage the full lifecycle of your technical SEO audits.
      These requests allow you to launch new crawls, monitor their progress in
      real-time, and retrieve detailed reports and page-level data for in-depth
      analysis.


      **Note on Costs:** Audits are billed on a per-page basis.


      - **Standard Audits:** 2 credits per crawled page.
          
      - **Advanced Audits (with JavaScript rendering):** 20 credits per crawled
      page.
          

      ### 1\. Create & Manage Audits


      Use these endpoints to start new crawls, re-run previous ones, or manage
      your list of audits.


      - **Create Audits**: Launch a new **Standard** (HTML crawl) or
      **Advanced** (JavaScript rendering) audit with highly customizable
      settings.
          
      - **List Audits**: Retrieve a paginated list of all audits associated with
      your account.
          
      - **Update Audit Title**: Change the display title of an existing audit
      report.
          
      - **Delete Audit**: Permanently remove an audit and all of its associated
      data.
          
      - **Recheck Audit**: Initiate a new crawl for a completed audit using its
      original settings.
          

      ### 2\. Monitor & Retrieve Data


      Once an audit is running or complete, use these endpoints to check its
      progress and pull detailed results.


      - **Get Audit Status**: Check the real-time progress of an ongoing audit.
          
      - **Get Audit Report**: Fetch the full, high-level report for a completed
      audit, including the overall health score and a summary of issues.
          
      - **Get Audit History**: Retrieve a historical snapshot of a specific
      audit run from a particular date.
          
      - **Get All Crawled Pages**: Return a complete, paginated list of every
      URL discovered during an audit.
          
      - **Get Audit Pages by Issue**: Get a list of all URLs affected by a
      single, specific issue.
          
      - **Get All Issues for a Specific URL**: Retrieve all errors, warnings,
      and notices found on a single page.
          
      - **Get All Found Links**: Fetch a complete list of every internal and
      external link discovered across the entire site during the audit.
  - name: Account & system
    description: >-
      This collection contains endpoints for retrieving information about your
      account status, subscription details, and current credit and API unit
      balances. Use these requests to monitor your usage and plan details
      programmatically.


      ### Endpoints


      - **Get Subscription Info**: Returns detailed information about your
      current API subscription plan, including its status (e.g., active,
      expired), validity dates, and the total and remaining API units available.
          
      - **Get Credit Balance**: Returns the current account-wide credit balance,
      showing the total limit and the amount of credits that have been used.
paths:
  /v1/backlinks/summary:
    get:
      operationId: getBacklinksSummary
      tags:
        - backlinks
      summary: summary
      description: >-
        Retrieves a comprehensive summary of backlink statistics for one or more
        targets.
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: target
          in: query
          schema:
            type: string
            description: Supports multiple targets by repeating this parameter.
          example: rubyonrails.org
        - name: mode
          in: query
          schema:
            type: string
            enum:
              - domain
              - host
              - url
            default: host
          example: host
        - name: output
          in: query
          schema:
            type: string
            enum:
              - json
              - xml
            default: json
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      operationId: createBacklinksSummary
      tags:
        - backlinks
      summary: summary
      description: >-
        Retrieves a comprehensive summary of backlink statistics for one or more
        targets.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                target:
                  - https://www.seranking.com/
                  - https://www.google.com/
                mode: host
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: output
          in: query
          schema:
            type: string
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/backlinks/metrics:
    get:
      operationId: getBacklinksMetrics
      tags:
        - backlinks
      summary: metrics
      description: >-
        Retrieves key backlink statistics (e.g., backlink, referring domain, and
        IP counts) for one or more targets.
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: target
          in: query
          schema:
            type: string
          example: target-rfunqmac.com
        - name: mode
          in: query
          schema:
            type: string
            enum:
              - domain
              - host
              - url
            default: host
          example: domain
        - name: output
          in: query
          schema:
            type: string
            enum:
              - json
              - xml
            default: json
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      operationId: createBacklinksMetrics
      tags:
        - backlinks
      summary: metrics
      description: >-
        Retrieves key backlink statistics (e.g., backlink, referring domain, and
        IP counts) for one or more targets.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                target:
                  - https://www.seranking.com/
                  - https://www.seranking.com/
                mode: url
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: output
          in: query
          schema:
            type: string
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/backlinks/all:
    get:
      operationId: getBacklinksAll
      tags:
        - backlinks
      summary: all
      description: >-
        Retrieves a detailed, filterable, and sortable list of backlinks
        pointing to a single target.
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: target
          in: query
          schema:
            type: string
          example: http://accordconsultants.in/
        - name: mode
          in: query
          schema:
            type: string
          example: url
        - name: output
          in: query
          schema:
            type: string
          example: json
        - name: limit
          in: query
          schema:
            type: integer
          example: 10000
        - name: per_domain
          in: query
          schema:
            type: integer
          example: 1
        - name: order_by
          in: query
          schema:
            type: string
          example: inlink_rank
        - name: url_from_filter
          in: query
          schema:
            type: string
          example: unsam.edu.ar
        - name: url_to_filter
          in: query
          schema:
            type: string
          example: .jpg
        - name: url_to_filter_mode
          in: query
          schema:
            type: string
            enum:
              - contains
              - does_not_contain
          example: does_not_contain
        - name: url_from_filter_mode
          in: query
          schema:
            type: string
            enum:
              - contains
              - does_not_contain
            default: contains
          example: contains
        - name: anchor_filter
          in: query
          description: Filter by anchor text. Max 2063 characters.
          schema:
            type: string
            maxLength: 2063
        - name: anchor_filter_mode
          in: query
          schema:
            type: string
            enum:
              - contains
              - does_not_contain
            default: contains
          example: contains
        - name: nofollow_filter
          in: query
          schema:
            type: string
            enum:
              - nofollow_only
              - dofollow_only
        - name: inlink_rank_from
          in: query
          description: Minimum InLink Rank (0-100).
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: inlink_rank_to
          in: query
          description: Maximum InLink Rank (0-100).
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: domain_inlink_rank_from
          in: query
          description: Minimum Domain InLink Rank (0-100).
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: domain_inlink_rank_to
          in: query
          description: Maximum Domain InLink Rank (0-100).
          schema:
            type: integer
            minimum: 0
            maximum: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      operationId: createBacklinksAll
      tags:
        - backlinks
      summary: all
      description: >-
        Retrieves a detailed, filterable, and sortable list of backlinks
        pointing to a single target.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                target: https://www.seranking.com/
                mode: domain
                limit: 10
                per_domain: 1
                order_by: date_found
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: output
          in: query
          schema:
            type: string
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/backlinks/raw:
    get:
      operationId: getBacklinksRaw
      tags:
        - backlinks
      summary: raw
      description: >-
        Fetches the complete list of backlinks for a target in batches using
        cursor-based pagination.
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: target
          in: query
          schema:
            type: string
          example: teilon.com
        - name: mode
          in: query
          schema:
            type: string
          example: host
        - name: limit
          in: query
          schema:
            type: integer
          example: 100
        - name: next
          in: query
          schema:
            type: string
          example: >-
            Pju9uZR4A2dylhvnUQ1UAu1NWfBjWoutYn_z2MHcVcZqH2eGVtT6Z6j2DjgyJKqyLem4yIj_it6xfHqasMXnj7/_zbLyBX93MmSekLiLxHa_gA9MRIrnPC2sxL4mDNzCzAsbK54U4UCScqvMexsrDx2obPcxHWZMl_yU7hQDa/9GJwcutpU0_v7TbtefRP9EVw/5eFZjvsNERYxl8jORIyNxL4N5t5LK75BaM51pYQ5q8bfuw/F42rIB8xKM0vD0i090_65JHrZPsDoAkKce/XELUwhGcoDqyRgG2P3AXAbZOe5RDFV/vz0YFTyI9tqynHJtP2olEKQ079f3hwroR6YML5AgTsVPwIynxNILAd_OHU5aFTReKIy686fBoIFZWR2dsyeGgN3r/n0jolcHNg==
        - name: output
          in: query
          schema:
            type: string
          example: json
        - name: per_domain
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
          example: 1
        - name: order_by
          in: query
          schema:
            type: string
            enum:
              - date_found
              - domain_inlink_rank
              - inlink_rank
            default: date_found
          example: date_found
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/backlinks/count:
    get:
      operationId: getBacklinksCount
      tags:
        - backlinks
      summary: count
      description: Returns the total number of live backlinks for one or more targets.
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: target
          in: query
          schema:
            type: string
            description: Supports multiple targets by repeating this parameter.
          example: anandaioga.com
        - name: mode
          in: query
          schema:
            type: string
            enum:
              - domain
              - host
              - url
            default: host
          example: url
        - name: output
          in: query
          schema:
            type: string
            enum:
              - json
              - xml
            default: json
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      operationId: createBacklinksCount
      tags:
        - backlinks
      summary: count
      description: Returns the total number of live backlinks for one or more targets.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                target:
                  - https://www.seranking.com/
                  - https://www.google.com/
                mode: host
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: output
          in: query
          schema:
            type: string
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/backlinks/export:
    get:
      operationId: getBacklinksExport
      tags:
        - backlinks
      summary: export
      description: >-
        Initiates an asynchronous task to export all backlinks for a target to a
        downloadable CSV file.
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: target
          in: query
          schema:
            type: string
          example: https://seranking.com
        - name: mode
          in: query
          schema:
            type: string
            enum:
              - domain
              - host
              - url
            default: host
          example: domain
        - name: output
          in: query
          schema:
            type: string
            enum:
              - json
              - xml
            default: json
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/backlinks/export/status:
    get:
      operationId: getBacklinksExportStatus
      tags:
        - backlinks
      summary: export/status
      description: >-
        Status of the asynchronous task to export all backlinks for a target to
        a downloadable CSV file.
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: task_id
          in: query
          required: true
          schema:
            type: string
          example: '1_878619'
        - name: output
          in: query
          schema:
            type: string
            enum:
              - json
              - xml
            default: json
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/backlinks/history:
    get:
      operationId: getBacklinksHistory
      tags:
        - backlinks
      summary: history
      description: >-
        Returns a list of new or lost backlinks for a single target within a
        specified date range.
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: target
          in: query
          schema:
            type: string
          example: https://www.seranking.com
        - name: mode
          in: query
          schema:
            type: string
          example: domain
        - name: new_lost_type
          in: query
          schema:
            type: string
            enum:
              - new
              - lost
          example: new
        - name: date_from
          in: query
          schema:
            type: string
          example: '2024-01-14'
        - name: date_to
          in: query
          schema:
            type: string
          example: '2025-08-28'
        - name: link_type
          in: query
          schema:
            type: string
            enum:
              - href
              - redirect
          example: href
        - name: anchor_type
          in: query
          schema:
            type: string
            enum:
              - text
              - image
              - undefined
          example: text
        - name: dofollow
          in: query
          schema:
            type: string
            enum:
              - dofollow
              - nofollow
              - undefined
          example: dofollow
        - name: output
          in: query
          schema:
            type: string
            enum:
              - json
              - xml
            default: json
          example: json
        - name: url_from
          in: query
          description: Filter by referring page URL.
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 100
          example: 100
        - name: order_by
          in: query
          schema:
            type: string
            enum:
              - new_lost_date
              - domain_inlink_rank
              - inlink_rank
            default: new_lost_date
          example: new_lost_date
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      operationId: createBacklinksHistory
      tags:
        - backlinks
      summary: history
      description: >-
        Returns a list of new or lost backlinks for a single target within a
        specified date range.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                target: https://www.seranking.com
                mode: domain
                date_from: '2025-09-15'
                date_to: '2025-10-01'
      parameters:
        - name: apikey
          in: query
          schema:
            type: string
          example: '{{secret_key_data}}'
        - name: output
          in: query
          schema:
            type: string
          example: json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v1/backlinks/history/count:
    get:
      operationId: getBacklinksHistoryCount
      tags:
        - backlinks
      summary: history/count
      description: >-
        Returns the daily count of new and lost backlinks for a target over a
