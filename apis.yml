apis:
  - aid: se-ranking:data-api
    name: SE Ranking Data API
    description: REST API providing access to SE Ranking's SEO datasets including keyword research, backlink analysis, domain analysis, SERP data, website audits, and AI search visibility tracking. Uses a credit-based billing model with per-request and per-record charges.
